apiVersion: apps/v1
kind: Deployment

metadata:
  name: html-app

spec:
  replicas: 2

  selector:
    matchLabels:
      app: html-app

  template:
    metadata:
      labels:
        app: html-app

    spec:
      containers:
      - name: html-app
        image: shivanand02/html-demo:v4
        ports:
        - containerPort: 80